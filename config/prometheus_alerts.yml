# Prometheus Alert Rules for Autonomous Agent

groups:
  - name: autonomous_agent_critical
    interval: 30s
    rules:
      # CRITICAL - Error rate > 2%
      - alert: HighErrorRate
        expr: |
          (
            rate(agent_errors_total[5m]) 
            / rate(agent_requests_total[5m])
          ) * 100 > 2
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate detected"
          description: |
            Error rate is {{ $value | printf "%.1f" }}% (threshold: 2%)
            ACTION: Check /api/v1/agent/status for details
          
      # CRITICAL - Latency p95 > 2s
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, rate(agent_latency_seconds_bucket[5m])) * 1000 > 2000
        for: 3m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High p95 latency"
          description: |
            p95 latency is {{ $value | printf "%.0f" }}ms (threshold: 2000ms)
            ACTION: Check queue depth and workers

  - name: autonomous_agent_warning
    interval: 30s
    rules:
      # WARNING - Error rate > 1%
      - alert: ElevatedErrorRate
        expr: |
          (
            rate(agent_errors_total[5m]) 
            / rate(agent_requests_total[5m])
          ) * 100 > 1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Elevated error rate"
          description: |
            Error rate is {{ $value | printf "%.1f" }}% (threshold: 1%)
            Monitor closely.

      # WARNING - Latency p95 > 1s
      - alert: ElevatedLatencyP95
        expr: |
          histogram_quantile(0.95, rate(agent_latency_seconds_bucket[5m])) * 1000 > 1000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Elevated p95 latency"
          description: |
            p95 latency is {{ $value | printf "%.0f" }}ms (threshold: 1000ms)

      # WARNING - Reuse rate < 30%
      - alert: LowReuseRate
        expr: |
          (
            rate(agent_reuse_total[5m]) 
            / rate(agent_requests_total[5m])
          ) * 100 < 30
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Low template reuse rate"
          description: |
            Reuse rate is {{ $value | printf "%.1f" }}% (threshold: 30%)
            May indicate template quality issues.

      # WARNING - Budget usage > 90%
      - alert: HighBudgetUsage
        expr: |
          (agent_budget_used_cost / agent_budget_max_cost) * 100 > 90
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High budget utilization"
          description: |
            Budget usage is {{ $value | printf "%.1f" }}% (threshold: 90%)
            Consider rate limiting requests.

      # WARNING - Queue backlog
      - alert: WorkerQueueBacklog
        expr: agent_workers_queued > 50
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Worker queue backlog"
          description: |
            {{ $value }} tasks queued (threshold: 50)

  - name: autonomous_agent_info
    interval: 30s
    rules:
      # INFO - Circuit breaker open
      - alert: CircuitBreakerOpen
        expr: agent_circuit_breaker_state == 1
        for: 1m
        labels:
          severity: info
          team: platform
        annotations:
          summary: "Circuit breaker opened"
          description: |
            Circuit breaker is OPEN - requests may be rejected.

      # INFO - Safe mode active
      - alert: SafeModeActive
        expr: agent_safe_mode == 1
        for: 1m
        labels:
          severity: info
          team: platform
        annotations:
          summary: "Safe mode activated"
          description: |
            System is running in safe mode.
